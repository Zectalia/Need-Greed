<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Need & Greed - Donjon & Butins</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            max-width: 1200px;
            width: 100%;
            background: #ecd9b4;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            padding: 30px;
            border: 1px solid #c9aa6f;
            text-align: center;
        }
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: #2c2b28e0;
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 8px 20px;
            margin-bottom: 30px;
            color: #fef0cf;
            font-weight: bold;
            gap: 15px;
        }
        .players-online {
            background: #00000066;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .reset-btn {
            background: #c47b3e;
            border: none;
            color: white;
            font-weight: bold;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .reset-btn:hover {
            background: #a85f2c;
            transform: scale(0.97);
        }
        .pioches-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            margin: 20px 0;
        }
        .pioche {
            flex: 1;
            min-width: 300px;
            background: #2c2b28;
            border-radius: 32px;
            padding: 25px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .pioche-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 50px;
            background: #3f2a1f;
            color: #fef0cf;
        }
        .pioche-title.donjon {
            background: #5a2d2d;
            box-shadow: 0 0 10px rgba(255,0,0,0.3);
        }
        .pioche-title.butins {
            background: #2d5a3b;
            box-shadow: 0 0 10px rgba(255,215,0,0.3);
        }
        .card-area {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 30px 20px;
            min-height: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .card {
            background: transparent;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            max-width: 350px;
            width: 100%;
            cursor: pointer;
        }
        .card:hover {
            transform: scale(1.08);
            filter: drop-shadow(0 0 15px rgba(255,215,0,0.5));
        }
        .card img {
            max-width: 100%;
            width: auto;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            display: block;
            margin: 0 auto;
        }
        .empty-card {
            color: #ecd9b4;
            font-size: 1.2rem;
            text-align: center;
            padding: 40px;
            background: #3f2a1f66;
            border-radius: 24px;
        }
        .draw-btn {
            background: #ffaa44;
            border: none;
            color: #2d1f12;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin: 15px 0 10px;
            width: 80%;
        }
        .draw-btn:hover {
            background: #ffcc66;
            transform: scale(1.02);
        }
        .draw-btn:active {
            transform: scale(0.98);
        }
        .deck-info {
            background: #3f2a1f;
            color: #fef0cf;
            padding: 8px;
            border-radius: 30px;
            margin-top: 10px;
            font-size: 0.85rem;
        }
        .reset-pioche-btn {
            background: #c47b3e88;
            border: 1px solid #c47b3e;
            color: white;
            font-size: 0.8rem;
            padding: 5px 12px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .reset-pioche-btn:hover {
            background: #c47b3e;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 25px;
            color: #5e4a31;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .card {
            animation: fadeIn 0.25s ease;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="top-bar">
        <div class="players-online" id="playerCountDisplay">👥 Connectés: --</div>
        <div>🎲 Need & Greed - Donjon & Butins</div>
        <button class="reset-btn" id="resetAllBtn">🔄 Reset complet (les deux pioches)</button>
    </div>

    <div class="pioches-container">
        <!-- PIOCHE DONJON -->
        <div class="pioche">
            <div class="pioche-title donjon">🏰 DONJON 🏰</div>
            <div class="card-area" id="donjonCardArea">
                <div class="empty-card">⚔️ Cliquez sur PIOCHEZ !</div>
            </div>
            <button class="draw-btn" id="donjonDrawBtn">⚔️ PIOCHEZ UNE CARTE</button>
            <div class="deck-info">
                📚 Cartes restantes : <span id="donjonCardsLeft">0</span>
            </div>
            <div>
                <button class="reset-pioche-btn" id="resetDonjonBtn">🔄 Remettre toutes les cartes Donjon</button>
            </div>
        </div>

        <!-- PIOCHE BUTINS -->
        <div class="pioche">
            <div class="pioche-title butins">💰 BUTINS 💰</div>
            <div class="card-area" id="butinsCardArea">
                <div class="empty-card">💎 Cliquez sur PIOCHEZ !</div>
            </div>
            <button class="draw-btn" id="butinsDrawBtn">💰 PIOCHEZ UNE CARTE</button>
            <div class="deck-info">
                📚 Cartes restantes : <span id="butinsCardsLeft">0</span>
            </div>
            <div>
                <button class="reset-pioche-btn" id="resetButinsBtn">🔄 Remettre toutes les cartes Butins</button>
            </div>
        </div>
    </div>

    <footer>
        ⚡ Synchronisation temps réel • Survolez une carte pour l'agrandir
    </footer>
</div>

<script>
    // ========== CONFIGURATION FIREBASE - VOTRE BASE ==========
    const firebaseConfig = {
        databaseURL: "https://needandgreedproto-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    
    // Initialisation Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // Références pour les deux pioches
    const donjonRef = database.ref('/needandgreed_donjon');
    const butinsRef = database.ref('/needandgreed_butins');
    
    // ========== CONFIGURATION DES CARTES ==========
    // DONJON : 33 cartes nommées 1.png à 33.png dans le dossier "Donjon"
    const NB_DONJON_CARDS = 33;
    const DONJON_CARDS = [];
    for (let i = 1; i <= NB_DONJON_CARDS; i++) {
        DONJON_CARDS.push({ id: i, image: `Donjon/${i}.png` });
    }
    
    // BUTINS : 33 cartes nommées 1.png à 33.png dans le dossier "Butins"
    const NB_BUTINS_CARDS = 33;
    const BUTINS_CARDS = [];
    for (let i = 1; i <= NB_BUTINS_CARDS; i++) {
        BUTINS_CARDS.push({ id: i, image: `Butins/${i}.png` });
    }
    
    // ========== CLASSE POUR GÉRER UNE PIOCHE ==========
    class Pioche {
        constructor(name, cardList, firebaseRef, uiIds) {
            this.name = name;
            this.cardList = cardList;
            this.firebaseRef = firebaseRef;
            this.currentDeck = [];
            this.currentCard = null;
            this.isUpdating = false;
            this.ui = {
                cardArea: document.getElementById(uiIds.cardArea),
                cardsLeftSpan: document.getElementById(uiIds.cardsLeft),
                drawBtn: document.getElementById(uiIds.drawBtn),
                resetBtn: document.getElementById(uiIds.resetBtn)
            };
            
            this.init();
            this.setupListeners();
        }
        
        // Mélanger un tableau
        shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        // Initialiser un nouveau deck mélangé
        initNewDeck() {
            return this.shuffleArray([...this.cardList]);
        }
        
        // Sauvegarder le deck dans Firebase
        saveDeck() {
            if (this.isUpdating) return;
            const deckIds = this.currentDeck.map(card => card.id);
            this.firebaseRef.child('deck').set(deckIds);
        }
        
        // Sauvegarder la carte courante
        saveCurrentCard(card) {
            if (this.isUpdating) return;
            if (card) {
                this.firebaseRef.child('currentCard').set({
                    id: card.id,
                    image: card.image
                });
            } else {
                this.firebaseRef.child('currentCard').set(null);
            }
        }
        
        // Charger un deck depuis une liste d'IDs
        loadDeckFromIds(ids) {
            if (!ids || !Array.isArray(ids)) {
                this.currentDeck = this.initNewDeck();
                return;
            }
            this.currentDeck = ids.map(id => this.cardList.find(card => card.id === id)).filter(card => card !== undefined);
            if (this.currentDeck.length !== this.cardList.length) {
                const existingIds = new Set(this.currentDeck.map(c => c.id));
                const missingCards = this.cardList.filter(card => !existingIds.has(card.id));
                this.currentDeck.push(...missingCards);
            }
        }
        
        // Afficher la carte
        displayCard(card) {
            if (!card) {
                this.ui.cardArea.innerHTML = '<div class="empty-card">🎴 Aucune carte piochée...<br>Cliquez sur PIOCHEZ !</div>';
                return;
            }
            
            const imgHtml = `
                <div class="card">
                    <img src="${card.image}" alt="Carte ${card.id}" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\\'padding:40px;font-size:2rem;\\'>🃟<br><span style=\\'font-size:0.8rem;\\'>Image ${card.id} manquante<br>dossier ${this.name}</span></div>'">
                </div>
            `;
            this.ui.cardArea.innerHTML = imgHtml;
        }
        
        // Mettre à jour l'affichage des cartes restantes
        updateCardsLeftDisplay() {
            this.ui.cardsLeftSpan.innerText = this.currentDeck.length;
        }
        
        // Piocher une carte
        drawCard() {
            if (this.isUpdating) return;
            
            if (this.currentDeck.length === 0) {
                this.currentDeck = this.initNewDeck();
            }
            const newCard = this.currentDeck.shift();
            this.currentCard = newCard;
            
            this.saveCurrentCard(newCard);
            this.saveDeck();
            this.displayCard(newCard);
            this.updateCardsLeftDisplay();
        }
        
        // Réinitialiser la pioche
        resetDeck() {
            if (this.isUpdating) return;
            
            this.currentDeck = this.initNewDeck();
            this.currentCard = null;
            
            this.saveCurrentCard(null);
            this.saveDeck();
            this.displayCard(null);
            this.updateCardsLeftDisplay();
        }
        
        // Initialiser depuis Firebase
        init() {
            this.firebaseRef.child('deck').once('value', (snap) => {
                if (!snap.val()) {
                    this.currentDeck = this.initNewDeck();
                    this.saveDeck();
                    this.updateCardsLeftDisplay();
                } else {
                    this.loadDeckFromIds(snap.val());
                    this.updateCardsLeftDisplay();
                }
            });
            
            this.firebaseRef.child('currentCard').once('value', (snap) => {
                const cardData = snap.val();
                if (cardData && cardData.id !== undefined) {
                    this.currentCard = {
                        id: cardData.id,
                        image: cardData.image
                    };
                    this.displayCard(this.currentCard);
                } else {
                    this.displayCard(null);
                }
            });
        }
        
        // Écouter les changements Firebase
        setupListeners() {
            this.firebaseRef.child('deck').on('value', (snap) => {
                if (this.isUpdating) return;
                this.isUpdating = true;
                this.loadDeckFromIds(snap.val());
                this.updateCardsLeftDisplay();
                setTimeout(() => { this.isUpdating = false; }, 100);
            });
            
            this.firebaseRef.child('currentCard').on('value', (snap) => {
                if (this.isUpdating) return;
                this.isUpdating = true;
                const cardData = snap.val();
                if (cardData && cardData.id !== undefined) {
                    this.currentCard = {
                        id: cardData.id,
                        image: cardData.image
                    };
                    this.displayCard(this.currentCard);
                } else {
                    this.currentCard = null;
                    this.displayCard(null);
                }
                setTimeout(() => { this.isUpdating = false; }, 100);
            });
            
            this.ui.drawBtn.addEventListener('click', () => this.drawCard());
            this.ui.resetBtn.addEventListener('click', () => {
                if (confirm(`Remettre toutes les cartes ${this.name} dans la pioche ?`)) {
                    this.resetDeck();
                }
            });
        }
    }
    
    // ========== CRÉATION DES DEUX PIOCHES ==========
    const donjonPioche = new Pioche('Donjon', DONJON_CARDS, donjonRef, {
        cardArea: 'donjonCardArea',
        cardsLeft: 'donjonCardsLeft',
        drawBtn: 'donjonDrawBtn',
        resetBtn: 'resetDonjonBtn'
    });
    
    const butinsPioche = new Pioche('Butins', BUTINS_CARDS, butinsRef, {
        cardArea: 'butinsCardArea',
        cardsLeft: 'butinsCardsLeft',
        drawBtn: 'butinsDrawBtn',
        resetBtn: 'resetButinsBtn'
    });
    
    // ========== RESET GLOBAL ==========
    document.getElementById('resetAllBtn').addEventListener('click', () => {
        if (confirm("⚠️ RÉINITIALISATION TOTALE : Les deux pioches seront remises à zéro. Tout le monde verra le changement.")) {
            donjonPioche.resetDeck();
            butinsPioche.resetDeck();
        }
    });
    
    // ========== PRÉSENCE / JOUEURS CONNECTÉS ==========
    const presenceRef = database.ref('.info/connected');
    let myPresenceKey = null;
    const connectedPlayersRef = database.ref('/presence_pioches');
    
    presenceRef.on('value', (snap) => {
        if (snap.val() === true) {
            if (!myPresenceKey) {
                myPresenceKey = connectedPlayersRef.push().key;
                connectedPlayersRef.child(myPresenceKey).set({ online: true, timestamp: Date.now() });
                connectedPlayersRef.child(myPresenceKey).onDisconnect().remove();
            }
        }
    });
    
    connectedPlayersRef.on('value', (snap) => {
        const count = snap.numChildren();
        document.getElementById('playerCountDisplay').innerHTML = `👥 Connectés: ${count}`;
    });
    
    console.log("✅ Deux pioches prêtes !");
    console.log("📌 Dossiers nécessaires : 'Donjon/' et 'Butins/' avec les images 1.png à 33.png");
    console.log("🎴 Donjon → Donjon/1.png ... Donjon/33.png");
    console.log("💰 Butins → Butins/1.png ... Butins/33.png");
</script>
</body>
</html>
