<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Test jeu - 16 zones</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; background: #2c3e2f; margin: 0; padding: 20px;">

    <!-- Pioche -->
    <div style="display: flex; justify-content: center; margin-bottom: 30px;">
        <div id="pioche" style="background: #8b5a2b; color: white; width: 120px; height: 160px; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; box-shadow: 3px 3px 10px rgba(0,0,0,0.3); font-weight: bold; font-size: 1.2rem;">
            🃏 Pioche<br>
            <span id="nbCartes">15</span> cartes
        </div>
    </div>

    <!-- Carte piochée -->
    <div id="courante" style="background: #fdf5e6; width: 150px; height: 200px; margin: 20px auto; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 16px rgba(0,0,0,0.2); font-size: 1.5rem; font-weight: bold; border: 2px solid gold;">
        ⬅️ Pioche
    </div>

    <!-- 16 zones : 4 lignes x 4 colonnes -->
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 800px; margin: 30px auto 0 auto; padding: 10px;">
        <!-- Ligne 1 -->
        <div class="zone" data-zone="1" style="background: #5a3e2b; color: #ffefc0; aspect-ratio: 1 / 1; border: 3px dashed #d4b87a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; font-weight: bold;">Zone 1</div>
        <div class="zone" data-zone="2" style="background: #5a3e2b; color: #ffefc0; aspect-ratio: 1 / 1; border: 3px dashed #d4b87a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; font-weight: bold;">Zone 2</div>
        <div class="zone" data-zone="3" style="background: #5a3e2b; color: #ffefc0; aspect-ratio: 1 / 1; border: 3px dashed #d4b87a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; font-weight: bold;">Zone 3</div>
        <div class="zone" data-zone="4" style="background: #5a3e2b; color: #ffefc0; aspect-ratio: 1 / 1; border: 3px dashed #d4b87a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; font-weight: bold;">Zone 4</div>
        
        <!-- Ligne 2 -->
        <div class="zone" data-zone="5" style="background: #5a3e2b; color: #ffefc0; aspect-ratio: 1 / 1; border: 3px dashed #d4b87a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; font-weight: bold;">Zone 5</div>
        <div class="zone" data-zone="6" style="background: #5a3e2b; color: #ffefc0; aspect-ratio: 1 / 1; border: 3px dashed #d4b87a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; font-weight: bold;">Zone 6</div>
        <div class="zone" data-zone="7" style="background: #5a3e2b; color: #ffefc0; aspect-ratio: 1 / 1; border: 3px dashed #d4b87a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; font-weight: bold;">Zone 7</div>
        <div class="zone" data-zone="8" style="background: #5a3e2b; color: #ffefc0; aspect-ratio: 1 / 1; border: 3px dashed #d4b87a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; font-weight: bold;">Zone 8</div>
        
        <!-- Ligne 3 -->
        <div class="zone" data-zone="9" style="background: #5a3e2b; color: #ffefc0; aspect-ratio: 1 / 1; border: 3px dashed #d4b87a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; font-weight: bold;">Zone 9</div>
        <div class="zone" data-zone="10" style="background: #5a3e2b; color: #ffefc0; aspect-ratio: 1 / 1; border: 3px dashed #d4b87a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; font-weight: bold;">Zone 10</div>
        <div class="zone" data-zone="11" style="background: #5a3e2b; color: #ffefc0; aspect-ratio: 1 / 1; border: 3px dashed #d4b87a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; font-weight: bold;">Zone 11</div>
        <div class="zone" data-zone="12" style="background: #5a3e2b; color: #ffefc0; aspect-ratio: 1 / 1; border: 3px dashed #d4b87a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; font-weight: bold;">Zone 12</div>
        
        <!-- Ligne 4 -->
        <div class="zone" data-zone="13" style="background: #5a3e2b; color: #ffefc0; aspect-ratio: 1 / 1; border: 3px dashed #d4b87a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; font-weight: bold;">Zone 13</div>
        <div class="zone" data-zone="14" style="background: #5a3e2b; color: #ffefc0; aspect-ratio: 1 / 1; border: 3px dashed #d4b87a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; font-weight: bold;">Zone 14</div>
        <div class="zone" data-zone="15" style="background: #5a3e2b; color: #ffefc0; aspect-ratio: 1 / 1; border: 3px dashed #d4b87a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; font-weight: bold;">Zone 15</div>
        <div class="zone" data-zone="16" style="background: #5a3e2b; color: #ffefc0; aspect-ratio: 1 / 1; border: 3px dashed #d4b87a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; font-weight: bold;">Zone 16</div>
    </div>

    <script>
        // === État du jeu ===
        let deck = [];
        let carteCourante = null;

        function initDeck() {
            deck = [];
            for (let i = 1; i <= 15; i++) {
                deck.push({ id: i, nom: `📄 Carte ${i}` });
            }
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            mettreAJourPioche();
        }

        function mettreAJourPioche() {
            const nbSpan = document.getElementById("nbCartes");
            if (nbSpan) nbSpan.innerText = deck.length;
        }

        function afficherCarteCourante() {
            const zoneCourante = document.getElementById("courante");
            if (!carteCourante) {
                zoneCourante.innerHTML = "⬅️ Pioche";
                zoneCourante.style.background = "#fdf5e6";
                return;
            }
            zoneCourante.innerHTML = carteCourante.nom;
            zoneCourante.style.background = "#ffe5b4";
        }

        function piocher() {
            if (deck.length === 0) {
                alert("Plus de cartes !");
                return;
            }
            carteCourante = deck.shift();
            mettreAJourPioche();
            afficherCarteCourante();
        }

        function deposerDansZone(zoneId) {
            if (!carteCourante) {
                alert("Pioche d'abord une carte !");
                return false;
            }
            console.log(`Carte ${carteCourante.nom} → zone ${zoneId}`);
            carteCourante = null;
            afficherCarteCourante();
            return true;
        }

        // Pioche au clic
        document.getElementById("pioche").addEventListener("click", piocher);

        // Zones : clic et drag & drop
        const zones = document.querySelectorAll(".zone");
        zones.forEach(zone => {
            zone.addEventListener("click", () => {
                deposerDansZone(zone.getAttribute("data-zone"));
            });
            
            zone.addEventListener("dragover", (e) => {
                e.preventDefault();
                zone.style.background = "#7e5a3c";
                zone.style.border = "3px solid #ffcc66";
            });
            
            zone.addEventListener("dragleave", () => {
                zone.style.background = "#5a3e2b";
                zone.style.border = "3px dashed #d4b87a";
            });
            
            zone.addEventListener("drop", (e) => {
                e.preventDefault();
                zone.style.background = "#5a3e2b";
                zone.style.border = "3px dashed #d4b87a";
                deposerDansZone(zone.getAttribute("data-zone"));
            });
        });

        // Drag & drop depuis la carte courante
        const carteElem = document.getElementById("courante");
        carteElem.setAttribute("draggable", "true");
        carteElem.addEventListener("dragstart", (e) => {
            if (!carteCourante) {
                e.preventDefault();
                return false;
            }
            e.dataTransfer.setData("text/plain", "carte");
        });

        initDeck();
    </script>
</body>
</html>
