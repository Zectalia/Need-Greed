<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Need & Greed - Pioche de cartes</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            max-width: 900px;
            width: 100%;
            background: #ecd9b4;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            padding: 30px;
            border: 1px solid #c9aa6f;
            text-align: center;
        }
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: #2c2b28e0;
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 8px 20px;
            margin-bottom: 30px;
            color: #fef0cf;
            font-weight: bold;
            gap: 15px;
        }
        .players-online {
            background: #00000066;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .reset-btn {
            background: #c47b3e;
            border: none;
            color: white;
            font-weight: bold;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .reset-btn:hover {
            background: #a85f2c;
            transform: scale(0.97);
        }
        .card-area {
            background: #2c2b28;
            border-radius: 24px;
            padding: 40px 20px;
            margin: 20px 0;
            min-height: 550px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: transparent;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            max-width: 450px;
            width: 100%;
            cursor: pointer;
        }
        /* EFFET HOVER : ZOOM SUR LA CARTE */
        .card:hover {
            transform: scale(1.08);
            filter: drop-shadow(0 0 15px rgba(255,215,0,0.5));
        }
        .card img {
            max-width: 100%;
            width: auto;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            display: block;
            margin: 0 auto;
        }
        .empty-card {
            color: #ecd9b4;
            font-size: 1.3rem;
            text-align: center;
            padding: 40px;
            background: #3f2a1f66;
            border-radius: 24px;
        }
        .draw-btn {
            background: #ffaa44;
            border: none;
            color: #2d1f12;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin-top: 20px;
        }
        .draw-btn:hover {
            background: #ffcc66;
            transform: scale(1.02);
        }
        .draw-btn:active {
            transform: scale(0.98);
        }
        .deck-info {
            background: #3f2a1f;
            color: #fef0cf;
            padding: 10px;
            border-radius: 30px;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 25px;
            color: #5e4a31;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .card {
            animation: fadeIn 0.25s ease;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="top-bar">
        <div class="players-online" id="playerCountDisplay">👥 Connectés: --</div>
        <div>🎴 Need & Greed - Pioche (33 cartes)</div>
        <button class="reset-btn" id="resetDeckBtn">🔄 Remettre toutes les cartes</button>
    </div>

    <div class="card-area">
        <div id="currentCardDisplay">
            <div class="empty-card">🎴 Cliquez sur PIOCHEZ !</div>
        </div>
        
        <button class="draw-btn" id="drawBtn">🎴 PIOCHEZ UNE CARTE</button>
        
        <div class="deck-info">
            📚 Cartes restantes dans la pioche : <span id="cardsLeft">0</span>
        </div>
    </div>

    <footer>
        ⚡ Synchronisation temps réel • Survolez la carte pour l'agrandir
    </footer>
</div>

<script>
    // ========== CONFIGURATION FIREBASE - VOTRE BASE ==========
    const firebaseConfig = {
        databaseURL: "https://needandgreedproto-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    
    // Initialisation Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // Références
    const gameRef = database.ref('/needandgreed_pioche');
    const currentCardRef = gameRef.child('currentCard');
    const deckRef = gameRef.child('deck');
    
    // ========== GÉNÉRATION AUTOMATIQUE DE 33 CARTES ==========
    // Les images doivent s'appeler 1.png, 2.png, 3.png ... 33.png dans le dossier "images"
    const NB_CARDS = 33;
    const CARD_LIST = [];
    
    for (let i = 1; i <= NB_CARDS; i++) {
        CARD_LIST.push({
            id: i,
            image: `images/${i}.png`
        });
    }
    
    // État local du deck (liste des cartes restantes)
    let currentDeck = [];
    let currentCard = null;
    let isUpdatingFromRemote = false;
    
    // ========== FONCTIONS DE GESTION DU DECK ==========
    
    // Mélanger un tableau (algorithme Fisher-Yates)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }
    
    // Initialiser un nouveau deck mélangé (copie complète de CARD_LIST)
    function initNewDeck() {
        return shuffleArray([...CARD_LIST]);
    }
    
    // Piocher une carte (enlève du deck et retourne la carte)
    function drawCardFromDeck() {
        if (currentDeck.length === 0) {
            // Si plus de cartes, on remet tout
            currentDeck = initNewDeck();
        }
        return currentDeck.shift();
    }
    
    // Sauvegarder le deck dans Firebase
    function saveDeckToFirebase() {
        if (isUpdatingFromRemote) return;
        // On sauvegarde juste les IDs des cartes
        const deckIds = currentDeck.map(card => card.id);
        deckRef.set(deckIds);
    }
    
    // Sauvegarder la carte courante
    function saveCurrentCardToFirebase(card) {
        if (isUpdatingFromRemote) return;
        if (card) {
            currentCardRef.set({
                id: card.id,
                image: card.image
            });
        } else {
            currentCardRef.set(null);
        }
    }
    
    // Charger un deck depuis une liste d'IDs
    function loadDeckFromIds(ids) {
        if (!ids || !Array.isArray(ids)) {
            currentDeck = initNewDeck();
            return;
        }
        currentDeck = ids.map(id => CARD_LIST.find(card => card.id === id)).filter(card => card !== undefined);
        // Si certaines cartes manquent, on les rajoute
        if (currentDeck.length !== CARD_LIST.length) {
            const existingIds = new Set(currentDeck.map(c => c.id));
            const missingCards = CARD_LIST.filter(card => !existingIds.has(card.id));
            currentDeck.push(...missingCards);
        }
    }
    
    // Afficher la carte courante dans l'interface (EN GRAND, sans texte)
    function displayCard(card) {
        const container = document.getElementById('currentCardDisplay');
        if (!card) {
            container.innerHTML = '<div class="empty-card">🎴 Aucune carte piochée... Cliquez sur PIOCHEZ !</div>';
            return;
        }
        
        // Gestion d'erreur si l'image n'existe pas
        const imgHtml = `
            <div class="card">
                <img src="${card.image}" alt="Carte ${card.id}" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\\'padding:40px;font-size:2rem;\\'>🃟<br><span style=\\'font-size:0.8rem;\\'>Image ${card.id} manquante</span></div>'">
            </div>
        `;
        
        container.innerHTML = imgHtml;
    }
    
    // Mettre à jour l'affichage des cartes restantes
    function updateCardsLeftDisplay() {
        document.getElementById('cardsLeft').innerText = currentDeck.length;
    }
    
    // Fonction principale de pioche (appelée par le bouton)
    function drawCard() {
        if (isUpdatingFromRemote) return;
        
        // Piocher une carte
        const newCard = drawCardFromDeck();
        currentCard = newCard;
        
        // Sauvegarder dans Firebase
        saveCurrentCardToFirebase(newCard);
        saveDeckToFirebase();
        
        // Mettre à jour l'affichage
        displayCard(newCard);
        updateCardsLeftDisplay();
    }
    
    // Réinitialiser complètement le deck (remettre toutes les cartes)
    function resetDeck() {
        if (isUpdatingFromRemote) return;
        
        currentDeck = initNewDeck();
        currentCard = null;
        
        // Sauvegarder
        saveCurrentCardToFirebase(null);
        saveDeckToFirebase();
        
        // Mettre à jour l'affichage
        displayCard(null);
        updateCardsLeftDisplay();
    }
    
    // ========== SYNCHRONISATION FIREBASE ==========
    
    // Écouter les changements du deck
    deckRef.on('value', (snap) => {
        if (isUpdatingFromRemote) return;
        isUpdatingFromRemote = true;
        
        const deckData = snap.val();
        loadDeckFromIds(deckData);
        updateCardsLeftDisplay();
        
        setTimeout(() => { isUpdatingFromRemote = false; }, 100);
    });
    
    // Écouter les changements de la carte courante
    currentCardRef.on('value', (snap) => {
        if (isUpdatingFromRemote) return;
        isUpdatingFromRemote = true;
        
        const cardData = snap.val();
        if (cardData && cardData.id !== undefined) {
            currentCard = {
                id: cardData.id,
                image: cardData.image
            };
            displayCard(currentCard);
        } else {
            currentCard = null;
            displayCard(null);
        }
        
        setTimeout(() => { isUpdatingFromRemote = false; }, 100);
    });
    
    // ========== PRÉSENCE / JOUEURS CONNECTÉS ==========
    const presenceRef = database.ref('.info/connected');
    let myPresenceKey = null;
    const connectedPlayersRef = database.ref('/presence_pioche');
    
    presenceRef.on('value', (snap) => {
        if (snap.val() === true) {
            if (!myPresenceKey) {
                myPresenceKey = connectedPlayersRef.push().key;
                connectedPlayersRef.child(myPresenceKey).set({ online: true, timestamp: Date.now() });
                connectedPlayersRef.child(myPresenceKey).onDisconnect().remove();
            }
        }
    });
    
    connectedPlayersRef.on('value', (snap) => {
        const count = snap.numChildren();
        document.getElementById('playerCountDisplay').innerHTML = `👥 Connectés: ${count}`;
    });
    
    // ========== INITIALISATION ==========
    
    // Initialiser le deck si vide
    deckRef.once('value', (snap) => {
        if (!snap.val()) {
            currentDeck = initNewDeck();
            saveDeckToFirebase();
            updateCardsLeftDisplay();
        } else {
            loadDeckFromIds(snap.val());
            updateCardsLeftDisplay();
        }
    });
    
    // Initialiser l'affichage de la carte si existante
    currentCardRef.once('value', (snap) => {
        const cardData = snap.val();
        if (cardData && cardData.id !== undefined) {
            currentCard = {
                id: cardData.id,
                image: cardData.image
            };
            displayCard(currentCard);
        } else {
            displayCard(null);
        }
    });
    
    // ========== ÉVÉNEMENTS UI ==========
    document.getElementById('drawBtn').addEventListener('click', drawCard);
    document.getElementById('resetDeckBtn').addEventListener('click', () => {
        if (confirm("Remettre toutes les cartes dans la pioche ? La carte actuelle disparaîtra.")) {
            resetDeck();
        }
    });
    
    console.log("✅ Pioche prête avec 33 cartes !");
    console.log("📌 Placez vos images dans le dossier 'images/' : 1.png, 2.png, 3.png ... 33.png");
    console.log("🖱️ Effet hover : passez la souris sur la carte pour la zoomer !");
</script>
</body>
</html>
