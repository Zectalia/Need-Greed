<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Test jeu - Pioche à gauche</title>
    <style>
        .zone {
            transition: all 0.1s ease;
            overflow: hidden;
            position: relative;
        }
        .zone img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
        .carte-dans-zone {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ZONE DE SURVOL */
        .zone-hover-preview {
            position: fixed;
            z-index: 9999;
            width: 280px;
            height: 380px;
            background: rgba(0,0,0,0.92);
            border-radius: 20px;
            padding: 12px;
            border: 4px solid gold;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px);
        }
        .zone-hover-preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
        }
        
        .zone {
            cursor: pointer;
        }
        
        .zone span {
            display: none;
        }

        /* Layout principal : pioche à gauche, contenu à droite */
        .main-layout {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .pioche-col {
            flex-shrink: 0;
        }
        
        .game-col {
            flex: 1;
            min-width: 500px;
        }
    </style>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; background: #1a2a1a; margin: 0; padding: 20px;">

    <div class="main-layout">
        <!-- COLONNE GAUCHE : Pioche -->
        <div class="pioche-col">
            <div id="pioche" style="background: #8b5a2b; color: white; width: 120px; height: 170px; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; box-shadow: 3px 3px 10px rgba(0,0,0,0.3); font-weight: bold; font-size: 1.2rem;">
                🃏<br>
                Pioche
            </div>
        </div>

        <!-- COLONNE DROITE : Jeu -->
        <div class="game-col">
            <!-- Carte piochée -->
            <div id="courante" style="background: #fdf5e6; width: 120px; height: 170px; margin: 0 auto 20px auto; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 16px rgba(0,0,0,0.3); border: 2px solid gold; overflow: hidden;">
                <div style="text-align: center; font-size: 1rem;">⬅️ Pioche</div>
            </div>

            <!-- 4 GROUPES -->
            <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 20px;">
                
                <!-- GROUPE 1 - ROUGE -->
                <div style="background: #4a1a1a; border-radius: 15px; padding: 12px; border: 2px solid #ff6666;">
                    <h3 style="color: #ff8888; margin: 0 0 10px 0; font-size: 1.1rem;">🔥 Feu</h3>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 180px;">
                        <div class="zone" data-zone="1" data-groupe="feu" style="background: #8b3a3a; aspect-ratio: 3 / 4; border: 2px solid #ff8888; border-radius: 8px; cursor: pointer; overflow: hidden;"><div class="carte-dans-zone"></div></div>
                        <div class="zone" data-zone="2" data-groupe="feu" style="background: #8b3a3a; aspect-ratio: 3 / 4; border: 2px solid #ff8888; border-radius: 8px; cursor: pointer; overflow: hidden;"><div class="carte-dans-zone"></div></div>
                        <div class="zone" data-zone="3" data-groupe="feu" style="background: #8b3a3a; aspect-ratio: 3 / 4; border: 2px solid #ff8888; border-radius: 8px; cursor: pointer; overflow: hidden;"><div class="carte-dans-zone"></div></div>
                        <div class="zone" data-zone="4" data-groupe="feu" style="background: #8b3a3a; aspect-ratio: 3 / 4; border: 2px solid #ff8888; border-radius: 8px; cursor: pointer; overflow: hidden;"><div class="carte-dans-zone"></div></div>
                    </div>
                </div>

                <!-- GROUPE 2 - BLEU -->
                <div style="background: #1a1a4a; border-radius: 15px; padding: 12px; border: 2px solid #6666ff;">
                    <h3 style="color: #8888ff; margin: 0 0 10px 0; font-size: 1.1rem;">💧 Eau</h3>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 180px;">
                        <div class="zone" data-zone="5" data-groupe="eau" style="background: #3a3a8b; aspect-ratio: 3 / 4; border: 2px solid #8888ff; border-radius: 8px; cursor: pointer; overflow: hidden;"><div class="carte-dans-zone"></div></div>
                        <div class="zone" data-zone="6" data-groupe="eau" style="background: #3a3a8b; aspect-ratio: 3 / 4; border: 2px solid #8888ff; border-radius: 8px; cursor: pointer; overflow: hidden;"><div class="carte-dans-zone"></div></div>
                        <div class="zone" data-zone="7" data-groupe="eau" style="background: #3a3a8b; aspect-ratio: 3 / 4; border: 2px solid #8888ff; border-radius: 8px; cursor: pointer; overflow: hidden;"><div class="carte-dans-zone"></div></div>
                        <div class="zone" data-zone="8" data-groupe="eau" style="background: #3a3a8b; aspect-ratio: 3 / 4; border: 2px solid #8888ff; border-radius: 8px; cursor: pointer; overflow: hidden;"><div class="carte-dans-zone"></div></div>
                    </div>
                </div>

                <!-- GROUPE 3 - VERT -->
                <div style="background: #1a4a1a; border-radius: 15px; padding: 12px; border: 2px solid #66ff66;">
                    <h3 style="color: #88ff88; margin: 0 0 10px 0; font-size: 1.1rem;">🌿 Terre</h3>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 180px;">
                        <div class="zone" data-zone="9" data-groupe="terre" style="background: #3a8b3a; aspect-ratio: 3 / 4; border: 2px solid #88ff88; border-radius: 8px; cursor: pointer; overflow: hidden;"><div class="carte-dans-zone"></div></div>
                        <div class="zone" data-zone="10" data-groupe="terre" style="background: #3a8b3a; aspect-ratio: 3 / 4; border: 2px solid #88ff88; border-radius: 8px; cursor: pointer; overflow: hidden;"><div class="carte-dans-zone"></div></div>
                        <div class="zone" data-zone="11" data-groupe="terre" style="background: #3a8b3a; aspect-ratio: 3 / 4; border: 2px solid #88ff88; border-radius: 8px; cursor: pointer; overflow: hidden;"><div class="carte-dans-zone"></div></div>
                        <div class="zone" data-zone="12" data-groupe="terre" style="background: #3a8b3a; aspect-ratio: 3 / 4; border: 2px solid #88ff88; border-radius: 8px; cursor: pointer; overflow: hidden;"><div class="carte-dans-zone"></div></div>
                    </div>
                </div>

                <!-- GROUPE 4 - JAUNE -->
                <div style="background: #4a3a1a; border-radius: 15px; padding: 12px; border: 2px solid #ffcc66;">
                    <h3 style="color: #ffcc66; margin: 0 0 10px 0; font-size: 1.1rem;">⚡ Foudre</h3>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 180px;">
                        <div class="zone" data-zone="13" data-groupe="foudre" style="background: #8b7a3a; aspect-ratio: 3 / 4; border: 2px solid #ffcc66; border-radius: 8px; cursor: pointer; overflow: hidden;"><div class="carte-dans-zone"></div></div>
                        <div class="zone" data-zone="14" data-groupe="foudre" style="background: #8b7a3a; aspect-ratio: 3 / 4; border: 2px solid #ffcc66; border-radius: 8px; cursor: pointer; overflow: hidden;"><div class="carte-dans-zone"></div></div>
                        <div class="zone" data-zone="15" data-groupe="foudre" style="background: #8b7a3a; aspect-ratio: 3 / 4; border: 2px solid #ffcc66; border-radius: 8px; cursor: pointer; overflow: hidden;"><div class="carte-dans-zone"></div></div>
                        <div class="zone" data-zone="16" data-groupe="foudre" style="background: #8b7a3a; aspect-ratio: 3 / 4; border: 2px solid #ffcc66; border-radius: 8px; cursor: pointer; overflow: hidden;"><div class="carte-dans-zone"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let deck = [];
        let carteCourante = null;
        let hoverPreview = null;

        function getImagePath(carteId) {
            return `images/Butin_card${carteId}.png`;
        }

        function initDeck() {
            deck = [];
            for (let i = 1; i <= 15; i++) {
                deck.push({ 
                    id: i, 
                    nom: `Butin ${i}`,
                    image: getImagePath(i)
                });
            }
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
        }

        function afficherCarteCourante() {
            const zoneCourante = document.getElementById("courante");
            if (!carteCourante) {
                zoneCourante.innerHTML = '<div style="text-align: center; font-size: 1rem;">⬅️ Pioche</div>';
                zoneCourante.style.background = "#fdf5e6";
                return;
            }
            zoneCourante.innerHTML = `<img src="${carteCourante.image}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 10px;" alt="${carteCourante.nom}">`;
            zoneCourante.style.background = "#ffe5b4";
        }

        function piocher() {
            if (deck.length === 0) {
                alert("Plus de cartes !");
                return;
            }
            carteCourante = deck.shift();
            afficherCarteCourante();
        }

        function deposerDansZone(zoneElement) {
            if (!carteCourante) {
                alert("Pioche d'abord une carte !");
                return false;
            }
            
            const zoneId = zoneElement.getAttribute("data-zone");
            const groupe = zoneElement.getAttribute("data-groupe");
            
            const carteContainer = zoneElement.querySelector(".carte-dans-zone");
            if (carteContainer) {
                carteContainer.innerHTML = `<img src="${carteCourante.image}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 6px;" alt="${carteCourante.nom}">`;
            }
            
            zoneElement.style.border = "2px solid gold";
            
            console.log(`Carte ${carteCourante.nom} → Groupe ${groupe} - Zone ${zoneId}`);
            
            carteCourante = null;
            afficherCarteCourante();
            return true;
        }

        function createHoverPreview() {
            const preview = document.createElement('div');
            preview.className = 'zone-hover-preview';
            preview.style.display = 'none';
            document.body.appendChild(preview);
            return preview;
        }

        function showHoverPreview(zoneElement, event) {
            const imgElement = zoneElement.querySelector('.carte-dans-zone img');
            if (!imgElement) return;
            
            if (!hoverPreview) {
                hoverPreview = createHoverPreview();
            }
            
            const imgSrc = imgElement.src;
            hoverPreview.innerHTML = `<img src="${imgSrc}" alt="Aperçu">`;
            hoverPreview.style.display = 'flex';
            
            let mouseX = event.clientX + 20;
            let mouseY = event.clientY - 200;
            
            if (mouseY < 10) {
                mouseY = event.clientY + 40;
            }
            
            const maxX = window.innerWidth - 320;
            if (mouseX > maxX) {
                mouseX = event.clientX - 310;
            }
            if (mouseX < 10) mouseX = 10;
            
            hoverPreview.style.left = mouseX + 'px';
            hoverPreview.style.top = mouseY + 'px';
        }

        function hideHoverPreview() {
            if (hoverPreview) {
                hoverPreview.style.display = 'none';
            }
        }

        function updatePreviewPosition(event) {
            if (hoverPreview && hoverPreview.style.display === 'flex') {
                let mouseX = event.clientX + 20;
                let mouseY = event.clientY - 200;
                
                if (mouseY < 10) {
                    mouseY = event.clientY + 40;
                }
                
                const maxX = window.innerWidth - 320;
                if (mouseX > maxX) {
                    mouseX = event.clientX - 310;
                }
                if (mouseX < 10) mouseX = 10;
                
                hoverPreview.style.left = mouseX + 'px';
                hoverPreview.style.top = mouseY + 'px';
            }
        }

        document.getElementById("pioche").addEventListener("click", piocher);

        const zones = document.querySelectorAll(".zone");
        zones.forEach(zone => {
            zone.addEventListener("click", () => {
                deposerDansZone(zone);
            });
            
            zone.addEventListener("dragover", (e) => {
                e.preventDefault();
                zone.style.transform = "scale(1.02)";
            });
            
            zone.addEventListener("dragleave", () => {
                zone.style.transform = "scale(1)";
            });
            
            zone.addEventListener("drop", (e) => {
                e.preventDefault();
                zone.style.transform = "scale(1)";
                deposerDansZone(zone);
            });
            
            zone.addEventListener("mouseenter", (e) => {
                showHoverPreview(zone, e);
            });
            
            zone.addEventListener("mousemove", (e) => {
                updatePreviewPosition(e);
            });
            
            zone.addEventListener("mouseleave", () => {
                hideHoverPreview();
            });
        });

        const carteElem = document.getElementById("courante");
        carteElem.setAttribute("draggable", "true");
        carteElem.addEventListener("dragstart", (e) => {
            if (!carteCourante) {
                e.preventDefault();
                return false;
            }
            e.dataTransfer.setData("text/plain", "carte");
            if (carteCourante.image) {
                const dragIcon = new Image();
                dragIcon.src = carteCourante.image;
                e.dataTransfer.setDragImage(dragIcon, 40, 60);
            }
        });

        initDeck();
    </script>
</body>
</html>
