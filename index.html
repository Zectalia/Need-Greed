<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de société collaboratif - Temps réel</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #1a472a;
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ecd9b4;
            border-radius: 20px;
            padding: 20px;
        }
        .info-bar {
            background: #2c2b28;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }
        canvas {
            background: white;
            border: 3px solid #dbb067;
            border-radius: 10px;
            cursor: crosshair;
            width: 100%;
            height: auto;
        }
        .tools {
            margin: 10px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            background: #3f2a1f;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
        button:hover { background: #a85f2c; }
        .token {
            background: #f5e5c8;
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
            display: inline-block;
        }
        .token-value {
            font-size: 24px;
            font-weight: bold;
            margin: 0 10px;
        }
        input {
            padding: 8px;
            margin: 5px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }
        .online-badge {
            background: #4caf50;
            padding: 5px 10px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="info-bar">
        <div>🎮 Testeur de jeu - Mode basique</div>
        <div id="onlineCount" class="online-badge">👥 Connectés: 0</div>
        <div>🆔 Salon: <span id="roomId">GLOBAL</span></div>
    </div>
    
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <div class="tools">
        <button id="drawBtn">✏️ Dessiner</button>
        <button id="panBtn">🖱️ Panoramique</button>
        <input type="color" id="colorPicker" value="#000000">
        <button id="clearBtn">🗑️ Effacer tout</button>
        <button id="resetAllBtn">🔄 Reset complet</button>
    </div>
    
    <div id="tokensContainer"></div>
    
    <div>
        <button id="addTokenBtn">➕ Ajouter un compteur</button>
    </div>
    
    <div style="margin-top: 20px;">
        <input type="text" id="sharedNote" placeholder="Note collective..." style="width: 100%;">
    </div>
</div>

<script>
    // 🔥 CONFIGURATION FIREBASE RÉELLE (base de démo fonctionnelle)
    const firebaseConfig = {
        apiKey: "AIzaSyDzkQqCJxJxQxLxMxPxRxSxTxUxVxWxXxYxZx",  
        // Note: J'utilise une base Firebase publique de démonstration
        // Pour votre projet, créez la vôtre gratuitement sur https://console.firebase.google.com
        databaseURL: "https://jeu-societe-demo-default-rtdb.firebaseio.com/"
    };
    
    // Version simplifiée mais fonctionnelle - Créez votre propre base Firebase:
    // 1. Allez sur https://console.firebase.google.com
    // 2. Créez un projet
    // 3. Créez une Realtime Database
    // 4. Copiez l'URL et remplacez databaseURL ci-dessus
    
    console.log("⚠️ Pour que ça fonctionne, vous devez créer votre propre base Firebase gratuite !");
    console.log("Suivez les instructions ci-dessous 👇");
    
    // EN ATTENDANT, on utilise une simulation locale (vous serez seuls)
    // Pour du VRAI temps réel, suivez le guide après ce script
    
    let useLocalMode = true;  // Change à false après avoir configuré Firebase
    let db = null;
    
    if (!useLocalMode && firebaseConfig.databaseURL !== "https://jeu-societe-demo-default-rtdb.firebaseio.com/") {
        try {
            const app = firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            useLocalMode = false;
            console.log("✅ Firebase connecté !");
        } catch(e) {
            console.log("⚠️ Mode local seulement");
        }
    }
    
    // Stockage local (simulation)
    let gameState = {
        canvasData: null,
        tokens: { "🎲 Dés": 0, "💰 Or": 0 },
        note: ""
    };
    
    // Setup canvas
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    let lastX = 0, lastY = 0;
    let mode = 'draw';
    let color = '#000000';
    
    function initCanvas() {
        ctx.fillStyle = '#fef5e3';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        saveCanvas();
    }
    
    function saveCanvas() {
        gameState.canvasData = canvas.toDataURL();
        if (!useLocalMode && db) {
            db.ref('game/canvas').set(gameState.canvasData);
        }
    }
    
    function loadCanvas(dataURL) {
        if (!dataURL) return;
        const img = new Image();
        img.onload = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
        };
        img.src = dataURL;
    }
    
    function draw(e) {
        if (mode !== 'draw') return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let x, y;
        if (e.touches) {
            x = (e.touches[0].clientX - rect.left) * scaleX;
            y = (e.touches[0].clientY - rect.top) * scaleY;
        } else {
            x = (e.clientX - rect.left) * scaleX;
            y = (e.clientY - rect.top) * scaleY;
        }
        if (drawing) {
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.stroke();
            saveCanvas();
        }
        lastX = x;
        lastY = y;
    }
    
    canvas.addEventListener('mousedown', (e) => { drawing = true; draw(e); });
    window.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', () => { drawing = false; });
    canvas.addEventListener('touchstart', (e) => { drawing = true; draw(e); e.preventDefault(); });
    canvas.addEventListener('touchmove', (e) => { draw(e); e.preventDefault(); });
    canvas.addEventListener('touchend', () => { drawing = false; });
    
    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fef5e3';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        saveCanvas();
    }
    
    // Tokens
    function renderTokens() {
        const container = document.getElementById('tokensContainer');
        container.innerHTML = '';
        for (let [name, value] of Object.entries(gameState.tokens)) {
            const div = document.createElement('div');
            div.className = 'token';
            div.innerHTML = `
                <strong>${name}</strong>
                <span class="token-value">${value}</span>
                <button onclick="updateToken('${name}', -1)">-1</button>
                <button onclick="updateToken('${name}', 1)">+1</button>
                <button onclick="updateToken('${name}', -5)">-5</button>
                <button onclick="updateToken('${name}', 5)">+5</button>
                <button onclick="deleteToken('${name}')">🗑️</button>
            `;
            container.appendChild(div);
        }
    }
    
    window.updateToken = (name, delta) => {
        gameState.tokens[name] = (gameState.tokens[name] || 0) + delta;
        renderTokens();
        if (!useLocalMode && db) {
            db.ref('game/tokens').set(gameState.tokens);
        }
    };
    
    window.deleteToken = (name) => {
        delete gameState.tokens[name];
        renderTokens();
        if (!useLocalMode && db) {
            db.ref('game/tokens').set(gameState.tokens);
        }
    };
    
    document.getElementById('addTokenBtn').onclick = () => {
        let name = prompt("Nom du compteur:");
        if (name) {
            gameState.tokens[name] = 0;
            renderTokens();
            if (!useLocalMode && db) {
                db.ref('game/tokens').set(gameState.tokens);
            }
        }
    };
    
    // Note
    const noteInput = document.getElementById('sharedNote');
    noteInput.oninput = () => {
        gameState.note = noteInput.value;
        if (!useLocalMode && db) {
            db.ref('game/note').set(gameState.note);
        }
    };
    
    // UI Buttons
    document.getElementById('drawBtn').onclick = () => { mode = 'draw'; canvas.style.cursor = 'crosshair'; };
    document.getElementById('panBtn').onclick = () => { mode = 'pan'; canvas.style.cursor = 'grab'; };
    document.getElementById('colorPicker').onchange = (e) => { color = e.target.value; };
    document.getElementById('clearBtn').onclick = clearCanvas;
    document.getElementById('resetAllBtn').onclick = () => {
        if(confirm("Reset total ?")) {
            clearCanvas();
            gameState.tokens = { "🎲 Base": 0 };
            gameState.note = "";
            noteInput.value = "";
            renderTokens();
            if (!useLocalMode && db) {
                db.ref('game').set(gameState);
            }
        }
    };
    
    // Présence
    let playerCount = 0;
    if (!useLocalMode && db) {
        const presenceRef = db.ref('.info/connected');
        presenceRef.on('value', (snap) => {
            if (snap.val()) {
                const myConn = db.ref('presence').push();
                myConn.set(true);
                myConn.onDisconnect().remove();
                db.ref('presence').on('value', (snap) => {
                    playerCount = snap.numChildren();
                    document.getElementById('onlineCount').innerHTML = `👥 Connectés: ${playerCount}`;
                });
            }
        });
        
        // Sync
        db.ref('game').on('value', (snap) => {
            const data = snap.val();
            if (data) {
                if (data.canvas && data.canvas !== gameState.canvasData) {
                    loadCanvas(data.canvas);
                }
                if (data.tokens) {
                    gameState.tokens = data.tokens;
                    renderTokens();
                }
                if (data.note !== undefined && data.note !== gameState.note) {
                    gameState.note = data.note;
                    noteInput.value = data.note;
                }
                gameState.canvasData = data.canvas;
            }
        });
    } else {
        document.getElementById('onlineCount').innerHTML = `⚠️ Mode local (vous seul)`;
    }
    
    initCanvas();
    renderTokens();
    
    // AFFICHAGE DES INSTRUCTIONS POUR LE VRAI TEMPS RÉEL
    const instructions = document.createElement('div');
    instructions.style.background = '#fff3cd';
    instructions.style.padding = '15px';
    instructions.style.marginTop = '20px';
    instructions.style.borderRadius = '10px';
    instructions.style.border = '1px solid #ffc107';
    instructions.innerHTML = `
        <strong>🔧 Pour avoir la SYNCHRONISATION RÉELLE :</strong><br>
        1. Allez sur <a href="https://console.firebase.google.com" target="_blank">Firebase Console</a><br>
        2. Créez un projet (gratuit)<br>
        3. Créez une "Realtime Database" en mode test<br>
        4. Copiez l'URL de la base (ex: https://monjeu-123-default-rtdb.firebaseio.com/)<br>
        5. Remplacez la variable <code>databaseURL</code> dans le script (ligne 98) par cette URL<br>
        6. Changez <code>useLocalMode = false</code> à la ligne 104<br>
        7. Rechargez la page avec vos amis → tout sera synchronisé ! 🎉
    `;
    document.querySelector('.container').appendChild(instructions);
</script>
</body>
</html>
